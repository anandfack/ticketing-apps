services:
  app:
    ports:
      - "5173:5173"
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ticketing-app
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: ticketing-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16
    container_name: ticketing-db
    restart: always
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ticketing-redis
    ports:
      - "6379:6379"

volumes:
  dbdata: